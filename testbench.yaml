laravel: '@testbench'

env:
  - AWS_ACCESS_KEY_ID=herd
  - AWS_SECRET_ACCESS_KEY=secretkey
  - AWS_DEFAULT_REGION=us-east-1
  - AWS_BUCKET=herd-bucket
  - AWS_ENDPOINT=https://rustfs.herd.test
  - AWS_URL=https://rustfs.herd.test/herd-bucket
  - AWS_USE_PATH_STYLE_ENDPOINT=true

providers:
  - Lattice\Lattice\LatticeServiceProvider
  - Inertia\ServiceProvider
  - Workbench\App\Providers\WorkbenchServiceProvider

workbench:
  start: '/'
  welcome: false
  discovers:
    web: true
    api: false
    commands: false
    components: false
    views: true
  build:
    - migrate
    - db:seed:
        --class: Workbench\App\Seeders\DatabaseSeeder
        --force: true
