laravel: '@testbench'

providers:
  - Bambamboole\Lattice\LatticeServiceProvider
  - Inertia\ServiceProvider
  - Workbench\App\Providers\WorkbenchServiceProvider

workbench:
  start: '/'
  welcome: false
  discovers:
    web: true
    api: false
    commands: false
    components: false
    views: true
  build:
    - workbench:create-sqlite-db
    - migrate
    - db:seed:
        --class: Workbench\App\Seeders\WorkbenchUserSeeder
        --force: true
    - db:seed:
        --class: Workbench\App\Seeders\WorkbenchProductSeeder
        --force: true
