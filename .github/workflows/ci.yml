name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  js-static:
    name: JS Static (format, lint, types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - run: npm run format:check

      - run: npm run lint:github

      - run: npm run typecheck

      - run: npm run type-coverage

  vitest:
    name: Vitest (jsdom coverage)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - run: |
          mkdir -p coverage_vitest
          npm run test:coverage -- --project jsdom resources/js --reporter=default --reporter=junit --outputFile.junit=coverage_vitest/junit.xml

      - name: Upload Vitest coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          use_oidc: true
          files: coverage_vitest/lcov.info
          flags: vitest
          name: vitest
          disable_search: true
          fail_ci_if_error: true

      - name: Upload Vitest test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          use_oidc: true
          files: coverage_vitest/junit.xml
          flags: vitest
          name: vitest-tests
          report_type: test_results
          disable_search: true
          fail_ci_if_error: true

  vitest-browser:
    name: Vitest Browser
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('playwright/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright browser and system deps
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps only
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - run: |
          mkdir -p coverage_vitest
          npm run test:coverage -- --project browser --reporter=default --reporter=junit --outputFile.junit=coverage_vitest/browser-junit.xml

      - name: Upload Vitest browser coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          use_oidc: true
          files: coverage_vitest/lcov.info
          flags: vitest-browser
          name: vitest-browser
          disable_search: true
          fail_ci_if_error: true

      - name: Upload Vitest browser test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          use_oidc: true
          files: coverage_vitest/browser-junit.xml
          flags: vitest-browser
          name: vitest-browser-tests
          report_type: test_results
          disable_search: true
          fail_ci_if_error: true

  build-lib:
    name: Library Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - run: npm run build:lib

      - run: npm run check:package

  bundle-analysis:
    name: Workbench Bundle Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - name: Upload workbench bundle analysis to Codecov
        env:
          CODECOV_BUNDLE: "1"
        run: npm run build

  php-static:
    name: PHP Static (pint, phpstan, rector)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2

      - name: Resolve composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-8.4-${{ hashFiles('**/composer.json') }}
          restore-keys: composer-${{ runner.os }}-8.4-

      - run: composer install --prefer-dist --no-progress --no-interaction

      - name: Pint (style check)
        run: composer test:lint

      - name: PHPStan
        run: composer analyse

      - name: Rector (dry-run)
        run: composer rector:test

  generated-types:
    name: Generated TypeScript Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - name: Resolve composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-8.4-${{ hashFiles('**/composer.json') }}
          restore-keys: composer-${{ runner.os }}-8.4-

      - run: composer install --prefer-dist --no-progress --no-interaction

      - name: Generated TypeScript types are up to date
        run: |
          composer types
          git add --intent-to-add resources/js/types/generated.ts
          git diff --exit-code resources/js/types/generated.ts

  php-tests:
    name: PHP Tests (${{ matrix.php-version }}, ${{ matrix.coverage }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - php-version: "8.4"
            coverage: pcov
          - php-version: "8.5"
            coverage: none
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: ${{ matrix.coverage }}
          tools: composer:v2

      - name: Resolve composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-${{ matrix.php-version }}-${{ hashFiles('**/composer.json') }}
          restore-keys: composer-${{ runner.os }}-${{ matrix.php-version }}-

      - run: composer install --prefer-dist --no-progress --no-interaction

      - name: Pest (parallel)
        if: ${{ matrix.php-version != '8.4' }}
        run: composer test:parallel

      - name: Pest with coverage
        if: ${{ matrix.php-version == '8.4' }}
        run: composer test:coverage

      - name: Upload Pest coverage to Codecov
        if: ${{ !cancelled() && matrix.php-version == '8.4' }}
        uses: codecov/codecov-action@v7
        with:
          use_oidc: true
          files: coverage_phpunit/clover.xml
          flags: pest
          name: pest
          disable_search: true
          fail_ci_if_error: true

      - name: Upload Pest test results to Codecov
        if: ${{ !cancelled() && matrix.php-version == '8.4' }}
        uses: codecov/codecov-action@v7
        with:
          use_oidc: true
          files: coverage_phpunit/pest.junit.xml
          flags: pest
          name: pest-tests
          report_type: test_results
          disable_search: true
          fail_ci_if_error: true

      - name: Docs fixtures are up to date
        if: ${{ matrix.php-version == '8.4' }}
        run: |
          git add --intent-to-add docs/fixtures
          git diff --exit-code docs/fixtures
