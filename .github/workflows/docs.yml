name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "resources/**"
      - "workbench/resources/**"
      - "vite.config.ts"
      - "astro.config.mjs"
      - "package.json"
      - "package-lock.json"
      - ".npmrc"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # The docs build runs the workbench app build (via `npm run analyze`) to
      # generate the Sonda bundle report, which needs the Testbench skeleton that
      # `composer install` creates.
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Resolve composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-8.4-${{ hashFiles('**/composer.json') }}
          restore-keys: composer-${{ runner.os }}-8.4-

      - run: composer install --prefer-dist --no-progress --no-interaction

      - run: npm ci

      - name: Build the docs site
        run: npm run docs:build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist-docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
