name: Docs

# The PR trigger deliberately has no paths filter: "Docs (typecheck, tests,
# build)" is a required status check, and a path-filtered workflow that never
# triggers leaves the check "Expected" forever, blocking the merge. The changes
# job skips the build instead — a skipped required check counts as passed.
on:
  pull_request:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "resources/**"
      - "workbench/resources/**"
      - "vite.config.ts"
      - "astro.config.mjs"
      - "tsconfig.json"
      - "docs/tsconfig.json"
      - "package.json"
      - "package-lock.json"
      - ".npmrc"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  changes:
    name: Detect docs-relevant changes
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docs:
              - "docs/**"
              - "resources/**"
              - "workbench/resources/**"
              - "vite.config.ts"
              - "astro.config.mjs"
              - "tsconfig.json"
              - "package.json"
              - "package-lock.json"
              - ".npmrc"
              - ".github/workflows/docs.yml"

  docs:
    name: Docs (typecheck, tests, build)
    needs: changes
    # Fails open: if change detection itself broke, run the build rather than
    # silently skipping a required check.
    if: ${{ !cancelled() && (github.event_name != 'pull_request' || needs.changes.result != 'success' || needs.changes.outputs.docs == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Resolve composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-8.4-${{ hashFiles('**/composer.json') }}
          restore-keys: composer-${{ runner.os }}-8.4-

      - run: composer install --prefer-dist --no-progress --no-interaction

      - run: npm ci

      - run: npm run docs:typecheck

      - run: npm run docs:test

      - name: Build the docs site
        run: npm run docs:build

      - uses: actions/configure-pages@v6
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - uses: actions/upload-pages-artifact@v5
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        with:
          path: dist-docs/

  deploy:
    name: Deploy docs to GitHub Pages
    needs: docs
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
